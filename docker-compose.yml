services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking
    ports: 
      - "5432:5432"
    networks:
      - booking_network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - booking_network

networks:
  booking_network:
    driver: bridge
    name: booking_network